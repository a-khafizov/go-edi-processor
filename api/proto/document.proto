syntax = "proto3";

package go_edi_document_processor;

option go_package = "github.com/go-edi-document-processor/api/proto;proto";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

enum DocumentType {
  DOCUMENT_TYPE_UNSPECIFIED = 0;
  DOCUMENT_TYPE_XML = 1;
  DOCUMENT_TYPE_PDF = 2;
  DOCUMENT_TYPE_JSON = 3;
}

enum DocumentStatus {
  DOCUMENT_STATUS_UNSPECIFIED = 0;
  DOCUMENT_STATUS_PENDING = 1;
  DOCUMENT_STATUS_RECEIVED = 2;
  DOCUMENT_STATUS_PROCESSED = 3;
  DOCUMENT_STATUS_FAILED = 4;
}

message Document {
  string id = 1;
  DocumentType type = 2;
  bytes content = 3;
  string sender_id = 4;
  string receiver_id = 5;
  map<string, string> metadata = 6;
  DocumentStatus status = 7;
  google.protobuf.Timestamp processing_time = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message SendDocumentRequest {
  Document document = 1;
}

message SendDocumentResponse {
  string document_id = 1;
}

message GetDocumentByUUIDRequest {
  string uuid = 1;
}

message GetDocumentByUUIDResponse {
  Document document = 1;
}

service DocumentService {
  rpc SendDocument(SendDocumentRequest) returns (SendDocumentResponse) {
    option (google.api.http) = {
      post: "/api/v1/doc/send"
      body: "*"
    };
  }
  rpc GetDocumentByUUID(GetDocumentByUUIDRequest) returns (GetDocumentByUUIDResponse) {
    option (google.api.http) = {
      get: "/api/v1/doc/{uuid}"
    };
  }
}