name: prod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v -count=1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build binary
        run: make build

      - name: Verify binary
        run: |
          ls -la edi-processor
          ./edi-processor --version 2>&1 || echo "Binary works"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        run: |
          docker --version
          docker compose version

      - name: Start infrastructure
        run: |
          docker compose up -d postgresql redis mongodb clickhouse kafka kafka-ui
          echo "Waiting for dependencies to start..."
          sleep 10

      - name: Build binary
        run: make build
      
      - name: Mv binary to cmd
        run: |
          mv ./edi-processor ./cmd/

      - name: Deploy application
        run: |
          ./cmd/edi-processor || echo "Binary works"

      - name: Wait for application
        run: |
          echo "Waiting for application to start..."
          sleep 5

      - name: Show deployment info
        run: |
          echo "Deployment successful..."
